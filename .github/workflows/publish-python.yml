name: Publish Python

on:
  push:
    tags:
      - "ghost-doc-agent@*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build distribution
        working-directory: packages/agent-python
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/agent-python/dist/
          # Uses OIDC trusted publishing — no PYPI_TOKEN secret required.
          # Configure trusted publisher at: https://pypi.org/manage/account/publishing/
          # Settings: owner=<your-org>, repo=ghost-doc, workflow=publish-python.yml, env=pypi
