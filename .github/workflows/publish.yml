name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm --filter @ghost-doc/shared-types build
          pnpm --filter @ghost-doc/contractum build
          pnpm --filter @ghost-doc/agent-js build
          pnpm --filter @ghost-doc/exporter build
          pnpm --filter @ghost-doc/dashboard build
          pnpm --filter ghost-doc build
          pnpm --filter ghost-doc copy-dashboard

      - name: Publish
        run: |
          pnpm --filter @ghost-doc/shared-types publish --access public --no-git-checks --provenance
          pnpm --filter @ghost-doc/contractum publish --access public --no-git-checks --provenance
          pnpm --filter @ghost-doc/agent-js publish --access public --no-git-checks --provenance
          pnpm --filter ghost-doc publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
